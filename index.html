<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SnowShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фоновое видео -->
    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="assets/video-bg.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <!-- Основной контейнер -->
    <div class="container">
        <header class="header">
            <h1>🏂 SNOWSHOP</h1>
            <p class="subtitle">Коллекция 2026</p>
        </header>

        <!-- Категории -->
        <div class="categories">
            <button class="cat active" data-cat="all">Все</button>
            <button class="cat" data-cat="boards">Доски</button>
            <button class="cat" data-cat="boots">Ботинки</button>
            <button class="cat" data-cat="bindings">Крепления</button>
            <button class="cat" data-cat="clothes">Одежда</button>
        </div>

        <!-- Сетка товаров -->
        <div class="product-grid" id="productGrid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
