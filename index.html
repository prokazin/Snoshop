<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SnowShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фоновое видео -->
    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="assets/video-bg.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <!-- Основной контейнер -->
    <div class="container">
        <header class="header">
            <h1>🏂 SNOWSHOP</h1>
            <p class="subtitle">Коллекция 2026</p>
            
            <!-- Контакты (заблокированы) -->
            <div class="contacts">
                <a href="#" class="contact-link disabled" title="Instagram (заблокировано)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                    <span>Instagram</span>
                </a>
                <a href="#" class="contact-link disabled" title="Telegram (заблокировано)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 4.5L2.5 10.5L9.5 14.5L13.5 21.5L21.5 4.5Z"></path>
                        <path d="M9.5 14.5L13.5 9.5"></path>
                    </svg>
                    <span>Telegram</span>
                </a>
                <a href="#" class="contact-link disabled" title="Позвонить (заблокировано)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                    </svg>
                    <span>+7 (999) 999-99-99</span>
                </a>
            </div>
        </header>

        <!-- Категории -->
        <div class="categories" id="categoriesContainer">
            <!-- Категории будут загружаться из localStorage -->
        </div>

        <!-- Сетка товаров -->
        <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- Модальное окно товара -->
    <div class="product-modal" id="productModal">
        <div class="modal-overlay" onclick="closeProductModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeProductModal()">✕</button>
            
            <div class="modal-image-container">
                <img id="modalImage" src="" alt="" class="modal-image">
                <div class="modal-image-nav">
                    <button class="modal-nav-btn prev" onclick="changeImage(-1)">‹</button>
                    <span id="modalImageCounter" class="image-counter">1 / 1</span>
                    <button class="modal-nav-btn next" onclick="changeImage(1)">›</button>
                </div>
            </div>
            
            <div class="modal-info">
                <div class="modal-header">
                    <h2 id="modalName"></h2>
                    <span id="modalPrice" class="modal-price"></span>
                </div>
                
                <div class="modal-specs" id="modalSpecs"></div>
                
                <div class="modal-tags" id="modalTags"></div>
                <div class="modal-stock" id="modalStock"></div>
                <p id="modalDesc" class="modal-desc"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
