<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SnowShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фоновое видео -->
    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="assets/video-bg.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <!-- iOS стиль статус-бар -->
    <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
            <span>📶</span>
            <span>📶</span>
            <span>🔋</span>
        </div>
    </div>

    <!-- Основной контейнер -->
    <div class="container">
        <header class="header">
            <h1>🏂 SNOWSHOP</h1>
            <p class="subtitle">Коллекция 2026</p>
            <div class="header-actions">
                <button class="cart-btn" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
                <button class="admin-btn" onclick="location.href='admin.html'">⚙️</button>
            </div>
        </header>

        <!-- Категории -->
        <div class="categories">
            <button class="cat active" data-cat="all">Все</button>
            <button class="cat" data-cat="boards">Доски</button>
            <button class="cat" data-cat="boots">Ботинки</button>
            <button class="cat" data-cat="bindings">Крепления</button>
        </div>

        <!-- Сетка товаров -->
        <div class="product-grid" id="productGrid"></div>

        <!-- Корзина -->
        <div class="cart-modal" id="cartModal">
            <div class="cart-content">
                <h2>Корзина</h2>
                <div id="cartItems"></div>
                <button onclick="closeCart()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
