<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SnowShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фоновое видео -->
    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="assets/video-bg.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <!-- Основной контейнер -->
    <div class="container">
        <header class="header">
            <h1>🏂 SNOWSHOP</h1>
            <p class="subtitle">Коллекция 2026</p>
        </header>

        <!-- Категории -->
        <div class="categories">
            <button class="cat active" data-cat="all">Все</button>
            <button class="cat" data-cat="boards">Доски</button>
            <button class="cat" data-cat="boots">Ботинки</button>
            <button class="cat" data-cat="bindings">Крепления</button>
            <button class="cat" data-cat="clothes">Одежда</button>
        </div>

        <!-- Сетка товаров -->
        <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- Модальное окно товара -->
    <div class="product-modal" id="productModal">
        <div class="modal-overlay" onclick="closeProductModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeProductModal()">✕</button>
            
            <div class="modal-image-container">
                <img id="modalImage" src="" alt="" class="modal-image">
                <div class="modal-image-nav">
                    <button class="modal-nav-btn prev" onclick="changeImage(-1)">‹</button>
                    <span id="modalImageCounter" class="image-counter">1 / 1</span>
                    <button class="modal-nav-btn next" onclick="changeImage(1)">›</button>
                </div>
            </div>
            
            <div class="modal-info">
                <div class="modal-header">
                    <h2 id="modalName"></h2>
                    <span id="modalPrice" class="modal-price"></span>
                </div>
                
                <!-- Характеристики (видны посетителям) -->
                <div class="modal-specs" id="modalSpecs"></div>
                
                <div class="modal-tags" id="modalTags"></div>
                <div class="modal-stock" id="modalStock"></div>
                <p id="modalDesc" class="modal-desc"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
